<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ruffactor Login</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #f5f5f7;
            color: #1f2933;
        }

        .login-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .login-card {
            width: min(100%, 420px);
            background: #ffffff;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 18px 48px rgba(15, 23, 42, 0.12);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.75rem;
        }

        p {
            margin: 0 0 20px;
            color: #52606d;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 16px;
            padding: 12px 14px;
            border: 1px solid #cbd2d9;
            border-radius: 10px;
            font: inherit;
        }

        button {
            width: 100%;
            border: 0;
            border-radius: 10px;
            padding: 12px 14px;
            background: #126782;
            color: #ffffff;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
        }

        .error {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 10px;
            background: #fde8e8;
            color: #9b1c1c;
        }
    </style>
</head>
<body>
    <main class="login-shell">
        <section class="login-card">
            <h1>Log in</h1>
            <p>Authentication is required to access this page.</p>
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required>
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required>
                <button type="submit">Log in</button>
            </form>
        </section>
    </main>
</body>
</html>
